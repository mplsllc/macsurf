name: Bug report
description: Something in macsurf is broken, crashes, or behaves wrong
title: "[bug] "
labels: ["bug", "needs-repro"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! macsurf is an early alpha — bug reports from real hardware are exactly what this project needs.

        Please fill in as much as you can. The hardware and OS fields are especially important since macsurf targets a narrow platform window.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug. What did you do, what did you expect, what actually happened?
      placeholder: I clicked X and macsurf did Y, but I expected Z.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Numbered steps that reliably trigger the bug.
      placeholder: |
        1. Launch macsurf
        2. Navigate to https://example.com
        3. Click the menu
        4. ...
    validations:
      required: true
  - type: input
    id: url
    attributes:
      label: URL or test case
      description: If the bug involves a specific page, paste the URL or attach a minimal HTML file.
      placeholder: https://example.com/page
  - type: dropdown
    id: macsurf-version
    attributes:
      label: macsurf version
      description: Which build are you running? Check About box or release notes.
      options:
        - "0.1a1"
        - "0.1a2"
        - "Build from source (specify commit below)"
        - "Other (specify below)"
    validations:
      required: true
  - type: input
    id: macsurf-commit
    attributes:
      label: Commit / build details (if building from source)
      placeholder: e.g. fixes158a, commit dd118ad6
  - type: dropdown
    id: os-version
    attributes:
      label: Mac OS version
      options:
        - "9.0"
        - "9.0.4"
        - "9.1"
        - "9.2.1"
        - "9.2.2"
        - "SheepShaver"
        - "Other (specify below)"
    validations:
      required: true
  - type: input
    id: hardware
    attributes:
      label: Hardware
      description: Mac model, CPU speed, RAM. Be specific — quirks are often hardware-tied.
      placeholder: e.g. Beige Power Mac G3 desktop, 233 MHz, 96 MB RAM
    validations:
      required: true
  - type: input
    id: carbonlib
    attributes:
      label: CarbonLib version
      placeholder: e.g. 1.5, 1.6
  - type: dropdown
    id: network-mode
    attributes:
      label: Network mode
      description: How is macsurf reaching the web?
      options:
        - "Direct HTTP (no proxy)"
        - "Go TLS-stripping proxy"
        - "macSSL (native TLS)"
        - "Not applicable (offline / local file)"
  - type: textarea
    id: logs
    attributes:
      label: Logs, screenshots, crash info
      description: Paste log output, attach screenshots (drag into the textarea), or describe any error dialogs.
  - type: textarea
    id: notes
    attributes:
      label: Additional context
      description: Anything else that might be relevant — extensions loaded, system tweaks, when it started happening, etc.
  - type: checkboxes
    id: terms
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and this isn't a duplicate
          required: true
        - label: I'm running on real hardware or SheepShaver (not a guess at behavior)
          required: false
