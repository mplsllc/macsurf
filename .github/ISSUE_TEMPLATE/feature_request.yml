name: Feature request
description: Suggest a new CSS property, JS API, browser chrome feature, or other enhancement
title: "[feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        macsurf has an enormous CSS / DOM / JS surface still to fill in. Feature requests help us prioritize.

        Before filing, please check `docs/css-status.md` and the existing issues to see if it's already tracked.
  - type: textarea
    id: feature
    attributes:
      label: What feature would you like?
      description: Describe the CSS property, JS API, UI element, or behavior you'd like macsurf to support.
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: Why is this useful?
      description: What sites or use cases does this enable? Is there a specific real-world site that needs this?
  - type: dropdown
    id: area
    attributes:
      label: Area
      multiple: true
      options:
        - "CSS"
        - "Grid"
        - "Flex"
        - "JavaScript / DOM"
        - "Networking / HTTP"
        - "TLS / macSSL"
        - "Rendering / QuickDraw"
        - "Images"
        - "Fonts"
        - "Browser chrome / UI"
        - "Build / dev experience"
        - "Documentation"
    validations:
      required: true
  - type: textarea
    id: spec-link
    attributes:
      label: Spec or reference
      description: Link to the relevant CSS/JS spec, MDN page, or NetSurf upstream implementation if applicable.
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds you've tried, or other approaches that could solve the same problem.
